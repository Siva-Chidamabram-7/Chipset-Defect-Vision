# training/data.yaml — YOLO dataset configuration
#
# This file is the single source of truth for:
#   • class names and their integer indices
#   • the local dataset root path
#
# Consumed by:
#   training/train.py               — dataset validation and YOLO training call
#   app/model/predictor.py          — _load_class_names() reads 'names' at import time
#   training/scripts/sam_to_yolo.py — CLASS_MAP must stay in sync with 'names'
#
# Class index order MUST match the integer labels written in data/labels/**/*.txt.
# Changing index order or adding classes requires re-generating all label files
# and retraining the model from scratch.

