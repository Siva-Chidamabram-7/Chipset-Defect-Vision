# ══════════════════════════════════════════════════════════════════════════════
# PCB Defect Detection — Dataset Configuration
# ══════════════════════════════════════════════════════════════════════════════
#
# Dataset source: LOCAL — raw images under raw_data/<ClassName>/
#   Annotations are generated by the SAM pipeline:
#     python training/scripts/sam_to_yolo.py
#   Processed splits are placed under data/ in YOLO format.
#
# Expected directory layout (relative to project root):
#
#   data/
#   ├── images/
#   │   ├── train/   ← training images (.jpg / .png)
#   │   └── val/     ← validation images
#   └── labels/
#       ├── train/   ← YOLO-format .txt annotations
#       └── val/
#
# Label format per line:
#   <class_id> <x_center> <y_center> <width> <height>   (all values 0–1)
#
# ── Path resolution ───────────────────────────────────────────────────────────
# `path` is resolved relative to THIS yaml file's directory (training/).
# ../data resolves to <project_root>/data/
#
# ── Class alignment ───────────────────────────────────────────────────────────
# This mapping must exactly match CLASS_NAMES in app/model/predictor.py.
# Any mismatch causes the model to output wrong class labels silently.
# ══════════════════════════════════════════════════════════════════════════════

path: ../data          # dataset root — relative to training/data.yaml

train: images/train    # → <project_root>/data/images/train
val:   images/val      # → <project_root>/data/images/val

nc: 7
names:
  0: Missing_hole
  1: Mouse_bite
  2: Open_circuit
  3: Short
  4: Spur
  5: Spurious_copper
  6: Good
