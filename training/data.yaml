# nc: number of classes — must equal len(names)
nc: 10

# names: ordered list of class labels (index 0 → 9)
# These strings are mapped by predictor.py (class ID → display name)
# and by the frontend labelMap in script.js for human-readable labels.
names:
  - solder_bridge       # 0 — solder connecting pads that should be isolated
  - mouse_bite          # 1 — irregular edge notch on copper trace
  - open_circuit        # 2 — broken trace, no electrical contact
  - short               # 3 — unintended connection between pads/traces
  - spur                # 4 — thin copper protrusion from a trace
  - spurious_copper     # 5 — unwanted copper remaining after etching
  - missing_hole        # 6 — pad missing from the board
  - excess_solder       # 7 — too much solder on a joint
  - insufficient_solder # 8 — too little solder on a joint
  - good                # 9 — correct solder joint (currently removed from inference)
