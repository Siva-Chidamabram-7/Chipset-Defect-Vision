# Precision-first hyperparameters for small PCB dataset (5 classes, ~310 images)
# Tuned to minimize false positives at the cost of some recall

lr0: 0.005
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 5.0
warmup_momentum: 0.8
warmup_bias_lr: 0.05

# Loss — cls raised to 2.0 to separate classes cleanly
box: 7.5
cls: 2.0
dfl: 1.5

# Augmentation — conservative for industrial PCB imagery
hsv_h: 0.01
hsv_s: 0.30
hsv_v: 0.30
degrees: 5.0
translate: 0.05
scale: 0.30
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5
mosaic: 0.5
mixup: 0.0
copy_paste: 0.0
